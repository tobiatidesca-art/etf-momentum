name: Aggiornamento ETF Momentum

on:
  schedule:
    - cron: '0 5 * * *'   # ~06:00 ora italiana (con possibile ritardo GitHub)
  workflow_dispatch:
    inputs:
      invia_telegram:
        description: 'Invia messaggio Telegram dopo aggiornamento'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  aggiorna:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui backtest
        run: python backtest_reale.py

      - name: Invia Telegram
        if: github.event_name == 'schedule' || inputs.invia_telegram == true || inputs.invia_telegram == 'true'
        run: python telegram_send.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}

      - name: Commit e push risultati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html backtest_risultati.json
          git diff --cached --quiet || git commit -m "Aggiornamento automatico $(date +'%Y-%m-%d %H:%M UTC')"
          git push
